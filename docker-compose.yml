version: '3.8'

services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /usr/src/app
    volumes:
      - ./backend:/usr/src/app:delegated
      - /usr/src/app/node_modules
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/election
      - PORT=5000
    depends_on:
      - mongo
    command: sh -c "npm run dev"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    working_dir: /usr/src/app
    volumes:
      - ./web:/usr/src/app:delegated
      - /usr/src/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    command: sh -c "npm run dev -- --host 0.0.0.0"

volumes:
  mongo-data:
